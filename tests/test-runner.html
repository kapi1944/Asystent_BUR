<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BUR Asystent - testy</title>
    <style>
      body {
        margin: 24px;
        background: #141414;
        color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin-top: 0;
      }

      .test {
        margin: 8px 0;
        padding: 10px;
        border-radius: 6px;
        background: #222;
      }

      .ok {
        border-left: 4px solid #37b26c;
      }

      .blad {
        border-left: 4px solid #e53935;
      }

      .status {
        margin: 12px 0;
        padding: 10px;
        border-radius: 6px;
        background: #222;
        color: #ffdca8;
      }
    </style>
  </head>
  <body>
    <h1>BUR Asystent - testy</h1>
    <div id="aktualny-test" class="status">Aktualnie wykonywany test: oczekiwanie na start</div>
    <div id="wyniki"></div>

    <script src="../shared/komunikaty.js"></script>
    <script src="../shared/model.js"></script>
    <script src="../shared/model-walidacji.js"></script>
    <script src="../shared/normalizacja-tytulu.js"></script>
    <script src="../shared/daty.js"></script>
    <script src="../shared/bur-program-harmonogram.js"></script>
    <script src="../shared/wyszukiwarka-semper.js"></script>
    <script src="../shared/parser-semper.js"></script>
    <script src="../shared/selektory-bur.js"></script>
    <script src="../shared/walidatory-bur.js"></script>
    <script src="../shared/wypełniacz-bur.js"></script>
    <script src="../background/klient-semper.js"></script>
    <script>
      window.testyBurAsystent = [];

      function test(nazwa, funkcja) {
        window.testyBurAsystent.push({ nazwa: nazwa, funkcja: funkcja });
      }

      function sprawdzWarunek(warunek, komunikat) {
        if (!warunek) {
          throw new Error(komunikat || "Warunek nie zostal spelniony.");
        }
      }

      function sprawdzRownosc(aktualna, oczekiwana, komunikat) {
        if (aktualna !== oczekiwana) {
          throw new Error((komunikat || "Niepoprawna wartosc.") + " Otrzymano: " + aktualna + ", oczekiwano: " + oczekiwana);
        }
      }
    </script>
    <script src="normalizacja-tytulu.test.js"></script>
    <script src="daty.test.js"></script>
    <script src="wyszukiwarka-semper.test.js"></script>
    <script src="parser-semper-html.test.js"></script>
    <script src="polskie-znaki.test.js"></script>
    <script src="bur-program-harmonogram.test.js"></script>
    <script src="selektory-bur.test.js"></script>
    <script src="walidatory-bur.test.js"></script>
    <script src="wypełniacz-bur.test.js"></script>
    <script src="integracja-semper-panel.test.js"></script>
    <script>
      (async function uruchomTesty() {
        const kontener = document.getElementById("wyniki");
        const aktualnyTest = document.getElementById("aktualny-test");
        const parametry = new URLSearchParams(window.location.search);
        const grupa = (parametry.get("grupa") || "").toLowerCase();
        const mapowanieGrup = {
          wypelniacz: ["wypełniacz", "wypelniacz", "select2", "formularz"],
          semper: ["semper", "parser", "wyszukiwarka", "termin", "sekcje"],
          walidatory: ["walidator", "walidacja"]
        };
        const słowaGrupy = mapowanieGrup[grupa] || (grupa ? [grupa] : []);
        const testyDoUruchomienia = słowaGrupy.length
          ? window.testyBurAsystent.filter(function filtruj(testJednostkowy) {
            const nazwa = testJednostkowy.nazwa.toLowerCase();

            return słowaGrupy.some(function pasuje(słowo) {
              return nazwa.includes(słowo);
            });
          })
          : window.testyBurAsystent;
        let zaliczone = 0;
        let timeouty = 0;

        function uruchomZTimeoutem(testJednostkowy) {
          const timeout = new Promise(function ustawTimeout(resolve, reject) {
            setTimeout(function zgłośTimeout() {
              reject(new Error("TIMEOUT - " + testJednostkowy.nazwa));
            }, 5000);
          });

          return Promise.race([
            Promise.resolve().then(testJednostkowy.funkcja),
            timeout
          ]);
        }

        for (let indeks = 0; indeks < testyDoUruchomienia.length; indeks += 1) {
          const testJednostkowy = testyDoUruchomienia[indeks];
          const wynik = document.createElement("div");
          wynik.className = "test";
          aktualnyTest.textContent = "Aktualnie wykonywany test: " + testJednostkowy.nazwa;

          try {
            await uruchomZTimeoutem(testJednostkowy);
            zaliczone += 1;
            wynik.classList.add("ok");
            wynik.textContent = "OK - " + testJednostkowy.nazwa;
          } catch (blad) {
            wynik.classList.add("blad");
            wynik.textContent = "BLAD - " + testJednostkowy.nazwa + ": " + blad.message;
            if (/^TIMEOUT - /.test(blad.message || "")) {
              timeouty += 1;
            }
          }

          kontener.appendChild(wynik);
        }

        const podsumowanie = document.createElement("h2");
        aktualnyTest.textContent = "Aktualnie wykonywany test: zakończono";
        podsumowanie.textContent = "Wynik: " + zaliczone + " / " + testyDoUruchomienia.length + ", błędy: " + (testyDoUruchomienia.length - zaliczone) + ", timeouty: " + timeouty + (grupa ? ", grupa: " + grupa : "");
        kontener.prepend(podsumowanie);
      })();
    </script>
  </body>
</html>
